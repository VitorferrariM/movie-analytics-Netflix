<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Analytics Dashboard</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header & Filters -->
        <header class="top-header">
            <div class="header-title">
                <h1>Analytics</h1>
            </div>
            
            <div class="filters-container">
                <div class="filter-group">
                    <label for="filter-year">Ano de Lançamento</label>
                    <select id="filter-year">
                        <option value="all">Todos os Anos</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label for="filter-genre">Gênero</label>
                    <select id="filter-genre">
                        <option value="all">Todos os Gêneros</option>
                        <option value="Action">Action</option>
                        <option value="Comedy">Comedy</option>
                        <option value="Drama">Drama</option>
                        <option value="Sci-Fi">Sci-Fi</option>
                        <option value="Horror">Horror</option>
                        <option value="Romance">Romance</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="filter-rating">Avaliação Mínima</label>
                    <select id="filter-rating">
                        <option value="all">Todas as notas</option>
                        <option value="4">Acima de 4.0</option>
                        <option value="3">Acima de 3.0</option>
                        <option value="2">Acima de 2.0</option>
                    </select>
                </div>
            </div>
        </header>

        <main class="dashboard-layout">
            <!-- Left Sidebar KPIs -->
            <aside class="kpi-sidebar">
                <div class="kpi-card">
                    <h3>KPI &mdash; Total de Filmes</h3>
                    <div class="kpi-value" id="kpi-movies">0</div>
                </div>
                
                <div class="kpi-card">
                    <h3>KPI &mdash; Total de Avaliações</h3>
                    <div class="kpi-value" id="kpi-reviews">0</div>
                </div>

                <div class="kpi-card">
                    <h3>KPI &mdash; Total de Usuários</h3>
                    <div class="kpi-value" id="kpi-users">0</div>
                </div>
            </aside>

            <!-- Main Charts Grid -->
            <section class="charts-grid">
                <!-- Filmes por Ano (Line Chart) -->
                <div class="chart-card">
                    <div class="chart-header">Filmes por Ano</div>
                    <div class="chart-body">
                        <canvas id="chart-year"></canvas>
                    </div>
                </div>

                <!-- Filmes por Gênero (Bar Chart) -->
                <div class="chart-card">
                    <div class="chart-header">Filmes por gênero</div>
                    <div class="chart-body">
                        <canvas id="chart-genre"></canvas>
                    </div>
                </div>

                <!-- Popularidade x Qualidade (Scatter) -->
                <div class="chart-card">
                    <div class="chart-header">Popularidade x Qualidade</div>
                    <div class="chart-body">
                        <canvas id="chart-scatter"></canvas>
                    </div>
                </div>

                <!-- Top 5 Filmes (Table) -->
                <div class="chart-card">
                    <div class="chart-header">Top 5 Filmes</div>
                    <div class="chart-body table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>ID do Filme</th>
                                    <th>Título</th>
                                </tr>
                            </thead>
                            <tbody id="top-movies-tbody">
                                <!-- Populated via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Application scripts -->
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
